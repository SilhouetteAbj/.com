
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <meta name="theme-color" content="#0052FF" />
      <link rel="icon" href="/icons/icon-192.png" type="image/png" />
      <link rel="manifest" href="/manifest.webmanifest" />
      <title>Silhouette Abuja</title>
      <style>
        #app-splash {
          position: fixed;
          inset: 0;
          background: #ffffff;
          display: flex;
          align-items: center;
          justify-content: center;
          z-index: 9999;
          transition: opacity 0.35s ease;
        }
        #app-splash.hide {
          opacity: 0;
          pointer-events: none;
        }
        .splash-logo {
          width: 140px;
          height: 140px;
          border-radius: 999px;
          border: 2px solid #e5e7eb;
          display: flex;
          align-items: center;
          justify-content: center;
          overflow: hidden;
          box-shadow: 0 12px 30px rgba(0, 82, 255, 0.15);
          animation: spin 2.2s linear infinite;
        }
        .splash-logo img {
          width: 100%;
          height: 100%;
          object-fit: cover;
        }
        @keyframes spin {
          from { transform: rotate(0deg); }
          to { transform: rotate(360deg); }
        }
      </style>
    </head>

    <body>
      <div id="app-splash" aria-hidden="true">
        <div class="splash-logo">
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRgsnOwbpMeE0JQrY76UgyB7dmoD6z3P8_WrA&s" alt="Silhouette Diagnostics" />
        </div>
      </div>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
